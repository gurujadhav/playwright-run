name: Cucumber Playwright Tests

on:
  push:
    branches:
      - main
      - develop
      - 'testfix/**'
  workflow_dispatch:
    inputs:
      tags:
        description: 'Cucumber tag filter (e.g. @smoke or @regression)'
        required: false
        default: ''

# Cancel any in-progress run on the same branch when a new push arrives.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: Run BDD Tests
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Get pnpm store path
        id: pnpm-cache
        run: echo "store=$(pnpm store path)" >> $GITHUB_OUTPUT

      - name: Cache pnpm store
        uses: actions/cache@v4
        with:
          path: ${{ steps.pnpm-cache.outputs.store }}
          key: ${{ runner.os }}-pnpm-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Cache Playwright browsers
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: ${{ runner.os }}-playwright-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-playwright-

      - name: Install Playwright browsers
        run: pnpm run install:browsers

      # Create .env from GitHub Secrets so dotenvx can load credentials.
      # Add matching secrets in: Settings → Secrets and variables → Actions
      - name: Create .env file
        run: |
          cat > .env << 'EOF'
          USERNAME=${{ secrets.APP_USERNAME }}
          PASSWORD=${{ secrets.APP_PASSWORD }}
          LT_USERNAME=${{ secrets.LT_USERNAME }}
          LT_ACCESS_KEY=${{ secrets.LT_ACCESS_KEY }}
          EOF

      - name: Install Xvfb
        run: sudo apt-get install -y xvfb

      - name: Run tests (all)
        if: ${{ !inputs.tags }}
        run: xvfb-run --auto-servernum --server-args="-screen 0 1280x720x24" pnpm test
        env:
          HEADLESS: 'false'
          DISPLAY:  ':99'

      - name: Run tests (tag filter)
        if: ${{ inputs.tags }}
        run: xvfb-run --auto-servernum --server-args="-screen 0 1280x720x24" pnpm exec cucumber-js --tags "${{ inputs.tags }}"
        env:
          HEADLESS: 'false'
          DISPLAY:  ':99'

      - name: Upload test results
        if: always()
        id: upload
        uses: actions/upload-artifact@v4
        with:
          name: test-results-${{ github.ref_name }}-${{ github.run_number }}
          path: reports/
          retention-days: 30
          if-no-files-found: warn

      - name: Write artifact link to job summary
        if: always()
        run: |
          echo "## Test Results" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| | |" >> $GITHUB_STEP_SUMMARY
          echo "|---|---|" >> $GITHUB_STEP_SUMMARY
          echo "| Branch | \`${{ github.ref_name }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| Commit | \`${{ github.sha }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| Run | [#${{ github.run_number }}](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}) |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### 📦 [Download reports & videos](${{ steps.upload.outputs.artifact-url }})" >> $GITHUB_STEP_SUMMARY
