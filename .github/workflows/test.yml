name: Cucumber Playwright Tests

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]
  workflow_dispatch:
    inputs:
      tags:
        description: 'Cucumber tag filter (e.g. @smoke)'
        required: false
        default: ''

jobs:
  test:
    name: Run BDD Tests
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Get pnpm store path
        id: pnpm-cache
        run: echo "store=$(pnpm store path)" >> $GITHUB_OUTPUT

      - name: Cache pnpm store
        uses: actions/cache@v4
        with:
          path: ${{ steps.pnpm-cache.outputs.store }}
          key: ${{ runner.os }}-pnpm-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Cache Playwright browsers
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: ${{ runner.os }}-playwright-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-playwright-

      - name: Install Playwright browsers
        run: pnpm run install:browsers

      - name: Run tests (all)
        if: ${{ !inputs.tags }}
        run: pnpm test
        env:
          BASE_URL: ${{ vars.BASE_URL || 'https://www.saucedemo.com' }}
          HEADLESS: 'true'

      - name: Run tests (with tag filter)
        if: ${{ inputs.tags }}
        run: pnpm exec cucumber-js --tags "${{ inputs.tags }}"
        env:
          BASE_URL: ${{ vars.BASE_URL || 'https://www.saucedemo.com' }}
          HEADLESS: 'true'

      - name: Upload HTML report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: cucumber-report
          path: reports/
          retention-days: 14

      - name: Upload failure screenshots
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: failure-screenshots
          path: reports/
          retention-days: 7
